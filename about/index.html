<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - A.M.M. Elsayed</title>
    <link rel="icon" href="/images/tap-icon.png">
    
    <!-- Global Theme Styles -->
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/content.css">
    <link rel="stylesheet" href="/styles/blog-post.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>
    <my-header></my-header>
    <script type="module" src="/styles/header.js"></script>
    <script src="/menu.js"></script>

    <main>
        <div class="page-top">
            <h1>About Me</h1>
        </div>
        <div class="blog-post-wrapper" style="padding-top: 10px; padding-bottom: 10px;">
            <div id="toc-container" class="toc-container" style="display: none;">
                <h3>Contents</h3>
                <nav id="toc-content"></nav>
            </div>
            <div class="post-main-container">
                <div id="about-content" class="blog-post-content">
                    <p>Loading profile...</p>
                </div>
            </div>
        </div>
    </main>

    <my-footer></my-footer>
    <script type="module" src="/styles/footer.js"></script>

    <script>
        async function loadAboutContent() {
            try {
                const response = await fetch('about.md');
                if (!response.ok) throw new Error('Failed to load about.md');
                const markdown = await response.text();
                
                const contentEl = document.getElementById('about-content');
                contentEl.innerHTML = marked.parse(markdown);

                const tocContainer = document.getElementById('toc-container');
                const tocContent = document.getElementById('toc-content');
                const headings = contentEl.querySelectorAll('h1, h2, h3');
                const updateTocVisibility = () => {
                    const shouldShowToc = window.innerWidth > 1024 && headings.length > 0;
                    tocContainer.style.display = shouldShowToc ? 'block' : 'none';
                };

                if (headings.length > 0) {
                    const tocList = document.createElement('ul');
                    headings.forEach((heading, index) => {
                        const id = `about-heading-${index}`;
                        heading.id = id;

                        const li = document.createElement('li');
                        li.className = heading.tagName.toLowerCase();
                        const a = document.createElement('a');
                        a.href = `#${id}`;
                        a.textContent = heading.textContent;
                        li.appendChild(a);
                        tocList.appendChild(li);
                    });
                    tocContent.appendChild(tocList);
                }

                updateTocVisibility();
                window.addEventListener('resize', updateTocVisibility);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('about-content').innerHTML = `<p style="color:red">Error loading content: ${error.message}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAboutContent);
    </script>
</body>
</html>
