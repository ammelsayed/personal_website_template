<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Blog Post" id="og-title">
    <meta property="og:description" content="Blog Post" id="og-description">
    <meta property="og:url" content="">
    <meta property="og:type" content="article">
    <meta property="og:image" content="">
    
    <link rel="icon" href="/images/tap-icon.png">
    
    <!-- Global Theme Styles -->
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/blog-post.css">

    <!-- Markdown & Highlighting Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  
    <!-- Comments section -->
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />
    <link rel="stylesheet" href="https://unpkg.com/katex@v0.16/dist/katex.min.css" />

    <!-- Overtrue Share.js - professional sharing library with WeChat/QQ support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/social-share.js@1.0.16/dist/css/share.min.css">
</head>
<body>
    <my-header></my-header>
    <script type="module" src="/styles/header.js"></script>
    <script src="/menu.js"></script>

    <main>
        <div class="blog-post-wrapper">
            <div id="toc-container" class="toc-container" style="display: none;">
                <h3>Contents</h3>
                <nav id="toc-content"></nav>
            </div>

            <div class="post-main-container">
                <div class="post-header-section">
                    <h1 id="post-title">Loading...</h1>
                    <div id="post-meta" class="post-meta">
                        <!-- Populated by JS -->
                    </div>
                    
                </div>

                <article id="post-content" class="blog-post-content">
                    <p>Loading content...</p>
                </article>

                <div style="border-top: 1px solid var(--border-color);">
                    <h3 style="font-size: 18px; margin-bottom: 15px;"> Share this article:</h3>
                    <div class="social-share" id="social-share-container"></div>
                </div>

                <div id="waline"></div>

            </div>
        </div>
    </main>

    <script src="/styles/utils.js"></script>
    <my-footer></my-footer>
    <script type="module" src="/styles/footer.js"></script>

    <!-- Dependencies - Professional Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- Overtrue Share.js - professional sharing library -->
    <script src="https://cdn.jsdelivr.net/npm/social-share.js@1.0.16/dist/js/social-share.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let postId = urlParams.get('id');
            if (!postId) {
                document.getElementById('post-content').innerHTML = '<p>Error: No post ID provided.</p>';
                return;
            }

            try {
                const [mdRes, jsonRes] = await Promise.all([
                    fetch(`/blog/${postId}.md`),
                    fetch('/data/blogs.json')
                ]);

                if (!mdRes.ok) throw new Error('Post not found');
                let markdown = await mdRes.text();
                const blogs = await jsonRes.json();
                const postData = blogs.find(b => b.link.includes(`id=${postId}`));

                // Initialize Marked with GFM
                marked.setOptions({
                    gfm: true,
                    breaks: true,
                    highlight: function(code, lang) {
                        if (Prism.languages[lang]) {
                            return Prism.highlight(code, Prism.languages[lang], lang);
                        }
                        return code;
                    },
                    langPrefix: 'language-'
                });

                const contentEl = document.getElementById('post-content');
                contentEl.innerHTML = marked.parse(markdown);

                // Process GitHub-style Alerts - FIXED for proper spacing!
                processGitHubAlerts(contentEl);
                
                // Wrap code blocks in a wrapper for fixed copy button
                document.querySelectorAll('pre').forEach(pre => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block-wrapper';
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);

                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'Copy';
                    wrapper.appendChild(btn);
                    btn.addEventListener('click', async () => {
                        await navigator.clipboard.writeText(pre.querySelector('code').innerText);
                        btn.innerText = 'Copied';
                        btn.classList.add('copied');
                        setTimeout(() => { btn.innerText = 'Copy'; btn.classList.remove('copied'); }, 2000);
                    });
                });

                // Ensure Prism.js highlights all code blocks
                Prism.highlightAllUnder(contentEl);

                // Generate Table of Contents
                const tocContainer = document.getElementById('toc-container');
                const tocContent = document.getElementById('toc-content');
                const headings = contentEl.querySelectorAll('h2, h3');
                const updateTocVisibility = () => {
                    const shouldShowToc = window.innerWidth > 1024 && headings.length > 0;
                    tocContainer.style.display = shouldShowToc ? 'block' : 'none';
                };
                
                if (headings.length > 0) {
                    const tocList = document.createElement('ul');
                    headings.forEach((heading, index) => {
                        const id = `heading-${index}`;
                        heading.id = id;
                        
                        const li = document.createElement('li');
                        li.className = heading.tagName.toLowerCase();
                        const a = document.createElement('a');
                        a.href = `#${id}`;
                        a.textContent = heading.textContent;
                        li.appendChild(a);
                        tocList.appendChild(li);
                    });
                    tocContent.appendChild(tocList);
                }

                updateTocVisibility();
                window.addEventListener('resize', updateTocVisibility);

                // Force theme background
                const updatePostTheme = () => {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    document.body.style.backgroundColor = 'var(--background-color)';
                };
                updatePostTheme();
                
                const observer = new MutationObserver(updatePostTheme);
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

                // Set Title
                const h1InContent = contentEl.querySelector('h1');
                const titleText = h1InContent ? h1InContent.innerText : 'Blog Post';
                document.getElementById('post-title').innerText = titleText;
                document.title = titleText + ' | Blog';

                // Update Open Graph for sharing
                document.getElementById('og-title').content = titleText;
                
                // Get first paragraph for description
                const firstPara = contentEl.querySelector('p');
                const desc = firstPara ? firstPara.innerText.slice(0, 200) : 'Read this blog post';
                document.getElementById('og-description').content = desc;
                document.querySelector('meta[property="og:url"]').content = window.location.href;

                // Get first image for sharing
                const firstImg = contentEl.querySelector('img');
                let imageUrl = '';
                if (firstImg) {
                    imageUrl = firstImg.src;
                    document.querySelector('meta[property="og:image"]').content = imageUrl;
                }

                // Set Metadata
                const metaEl = document.getElementById('post-meta');
                if (postData) {
                    const dateMeta = postData.meta ? postData.meta.find(m => m.icon === '🗓️' || /^[A-Za-z]+ \d{4}$/.test(m.text)) : null;
                    const author = postData.author || {};
                    const badge = postData.badge || '';
                    
                    metaEl.innerHTML = `
                        ${author.image ? `<img src="${author.image}" alt="${author.name}">` : ''}
                        <span>By <a href="${author.link || '#'}" target="_blank">${author.name || 'Author'}</a></span>
                        ${dateMeta ? `<span class="divider">/</span> <span>${dateMeta.text}</span>` : ''}
                        ${badge ? `<span class="divider">/</span> <span class="badge">${badge}</span>` : ''}
                        <span class="divider">/</span> Views: 
                    `;
                }

                const viewSpan = document.createElement('span');
                viewSpan.className = 'waline-pageview-count';
                viewSpan.setAttribute('data-path', `/blog/post/${postId}`);
                metaEl.appendChild(viewSpan);

                const { init } = await import('https://unpkg.com/@waline/client@v3/dist/waline.js');
                const katex  = await import('https://unpkg.com/katex@v0.16/dist/katex.mjs');
                init({
                    el: '#waline',
                    serverURL: 'https://commentsystem-amber.vercel.app/',
                    lang: 'en',
                    dark: document.documentElement.getAttribute('data-theme') === 'dark',
                    meta: ['nick'],
                    requiredMeta: [],
                    noCopyright: true,
                    noRss: true,
                    turnstileKey: false,
                    wordLimit:300,
                    pageview: true,
                    path: `/blog/post/${postId}`,
                    texRenderer: (blockMode, tex) =>
                    katex.renderToString(tex, {
                        displayMode: blockMode,
                        throwOnError: false,
                    }),
                });

                // Initialize Overtrue Share.js
                socialShare('#social-share-container', {
                    url: window.location.href,
                    title: titleText,
                    description: desc,
                    image: imageUrl,
                    sites: ['wechat', 'qq', 'weibo', 'facebook', 'twitter', 'linkedin'],
                    wechatQrcodeTitle: "WeChat Scan to Share"
                });

                if (window.renderMathInElement) {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('post-content').innerHTML = `<p>Error loading post: ${error.message}</p>`;
            }
        });

        function processGitHubAlerts(container) {
            container.querySelectorAll('blockquote').forEach(blockquote => {
                let alertType = null;
                
                // Find the alert type - look for [!TYPE] anywhere in the blockquote
                let alertFound = false;
                
                // Check all child nodes (text and p)
                for (let child of blockquote.childNodes) {
                    if (alertFound) break;
                    
                    if (child.nodeType === Node.TEXT_NODE) {
                        const text = child.textContent;
                        const match = text.match(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
                        if (match) {
                            alertType = match[1].toLowerCase();
                            // Replace the [!TYPE] with the proper styled title
                            child.textContent = text.replace(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i, '');
                            alertFound = true;
                        }
                    } else if (child.tagName === 'P') {
                        const html = child.innerHTML;
                        const match = html.match(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
                        if (match) {
                            alertType = match[1].toLowerCase();
                            // Clean up the p tag
                            child.innerHTML = html.replace(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i, '');
                            alertFound = true;
                        }
                    }
                }
                
                if (alertType) {
                    blockquote.classList.add('markdown-alert');
                    blockquote.classList.add(`markdown-alert-${alertType}`);
                }
            });
        }
    </script>
</body>
</html>
