<script type="module">
    async function loadLatest() {
        const sections = [
            { name: 'Publication', url: '/data/publications.json', page: '/publications/' },
            { name: 'Blog', url: '/data/blogs.json', page: '/blog/' },
            { name: 'Event', url: '/data/events.json', page: '/events/' }
        ];

        const container = document.getElementById('latest-content');
        const pinnedContainer = document.getElementById('pinned-content');
        const pinnedSection = document.getElementById('pinned-container');
        
        container.innerHTML = '';
        pinnedContainer.innerHTML = '';
        let hasPinned = false;

        for (const section of sections) {
            try {
                const response = await fetch(section.url);
                const data = await response.json();
                
                // Handle Pinned items
                const pinnedItems = data.filter(item => item.pinned === true);
                if (pinnedItems.length > 0) {
                    hasPinned = true;
                    pinnedItems.forEach(item => {
                        const card = createCard(item, section, 'Pinned');
                        pinnedContainer.appendChild(card);
                    });
                }

                // Sort by date (latest first) for Latest Updates
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const latest = data[0];
                if (latest) {
                    const card = createCard(latest, section, 'Latest');
                    container.appendChild(card);
                }
            } catch (error) {
                console.error(`Error loading ${section.name}:`, error);
            }
        }

        if (hasPinned) {
            pinnedSection.style.display = 'block';
        }
    }

    function createCard(item, section, typeLabel) {
        const card = document.createElement('div');
        card.className = 'latest-card';
        card.onclick = () => window.location.href = item.link || section.page;
        
        // Remove emoji from dateText if present
        let dateText = (item.meta && Array.isArray(item.meta)) ? (item.meta.find(m => m.icon === '🗓️')?.text || '') : '';
        
        card.innerHTML = `
            <div class="latest-card-header">
                <span class="badge">${typeLabel} ${section.name}</span>
                <span class="date">${dateText ? dateText : ''}</span>
            </div>
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        `;
        return card;
    }

    document.addEventListener('DOMContentLoaded', loadLatest);
</script>
